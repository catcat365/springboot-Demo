spring:
  application:
    name: demo
  datasource:
    # 数据库连接地址
    url: jdbc:mysql://localhost:3307/springboot_db?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
    # 数据库用户名
    username: springboot_db
    # 数据库密码
    password: springboot_db
    # 显式指定 MySQL 驱动类 (Spring Boot 3.x 推荐 com.mysql.cj.jdbc.Driver)
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 启动时自动根据实体类更新数据库表结构
      ddl-auto: update
    # 在控制台打印执行的 SQL 语句
    show-sql: true
    properties:
      hibernate:
        # 【关键】显式指定方言，防止自动检测失败
        dialect: org.hibernate.dialect.MySQLDialect

  # 增加redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0


# 文件上传配置
# 文件保存的本地绝对路径（请根据你电脑的实际路径修改）
file:
  upload:
    # 文件保存的本地绝对路径（请根据你电脑的实际路径修改）
    path: D:/project_data/uploads/
  url:
    # 访问文件的 URL 前缀
    prefix: /uploads/





server:
  port: 8080

